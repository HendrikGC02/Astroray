name: copilot-setup-steps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/copilot-setup-steps.yml'

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            ninja-build \
            python3 \
            python3-dev \
            python3-pip \
            pybind11-dev \
            libopencv-dev \
            libgomp1

      - name: Setup CUDA apt repository (no auto-install)
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.0'
          method: network

      - name: Install minimal CUDA packages
        run: |
          /usr/bin/sudo apt-get update -qq
          /usr/bin/sudo apt-get -y install \
            cuda-nvcc-12-4 \
            cuda-cudart-dev-12-4 \
            libcurand-12-4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest numpy

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPython3_EXECUTABLE=$(which python3)

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: List build artifacts
        run: |
          echo "=== build/bin ==="
          ls -lh build/bin/ 2>/dev/null || echo "(no bin dir)"
          echo "=== build/*.so ==="
          find build -name "*.so" | head -20
